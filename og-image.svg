<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 定义：暖棕渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5e6"/>
      <stop offset="50%" stop-color="#faf6ed"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(255, 230, 200, 0.6)"/>
      <stop offset="100%" stop-color="rgba(255, 230, 200, 0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="rgba(220, 200, 170, 0.4)"/>
      <stop offset="100%" stop-color="rgba(220, 200, 170, 0)"/>
    </radialGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 装饰：右上角细微噪点（模拟纸面） -->
  <g opacity="0.08">
    <rect x="1000" y="60" width="160" height="160" rx="80" fill="#8b6f47"/>
    <rect x="60" y="450" width="120" height="120" rx="60" fill="#8b6f47"/>
  </g>

  <!-- 主标题 -->
  <text x="600" y="280" font-family="Georgia, 'Source Han Serif SC', serif" font-size="120" font-weight="600" fill="#3a2e1f" text-anchor="middle" letter-spacing="2">AI <tspan fill="#c14545" font-style="italic" font-weight="400">×</tspan> 经济日报</text>

  <!-- 副标题 -->
  <text x="600" y="370" font-family="Georgia, 'Source Han Serif SC', serif" font-size="36" fill="#8b6f47" text-anchor="middle" letter-spacing="6">DAILY · 3 REPORTS / DAY</text>

  <!-- 分隔线 -->
  <line x1="450" y1="420" x2="750" y2="420" stroke="#8b6f47" stroke-width="1" opacity="0.4"/>

  <!-- 描述 -->
  <text x="600" y="475" font-family="Georgia, 'PingFang SC', sans-serif" font-size="28" fill="#6b5d4a" text-anchor="middle" letter-spacing="3">AI 科技 × 经济金融 · 中英双语 · 涨红跌绿</text>

  <!-- 时间戳装饰 -->
  <text x="600" y="540" font-family="Georgia, sans-serif" font-size="18" fill="#9a8a73" text-anchor="middle" letter-spacing="4">早 08:00 · 午 12:00 · 晚 20:00 · 北京时间</text>

  <!-- 边框：暖棕细线 -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#8b6f47" stroke-width="1" opacity="0.2" rx="8"/>
</svg>
